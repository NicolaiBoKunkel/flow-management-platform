name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flow_management_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/password123
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd="wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flow_management_test
      JWT_SECRET: test-jwt-secret
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password123
      PORT: 3001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npx prisma generate

      - run: npx prisma migrate deploy

      - run: npm run lint

      - run: npm run build

      - run: npm run test:cov

      - name: Start backend for Postman API tests
        run: npm run start &

      - name: Wait for backend
        run: npx wait-on http://localhost:3001/health

      - name: Run Postman API tests with Newman
        run: npm run test:postman

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run build